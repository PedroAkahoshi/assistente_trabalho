<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente Slim Tech</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-wrapper">
  <header class="chat-header">
    <h1>🤖 Assistente Slim Tech</h1>
  </header>

  <main id="chat" class="chat-container">
    <div class="chat-message ia-message">
      Olá! Sou sua assistente. Você pode digitar ou falar comigo.
    </div>
  </main>

  <div class="controls">
    <button id="start-voice">🎤 Falar</button>
    <button id="stop-voice">⏹️ Parar</button>
    <button id="switch-mode">⌨️ Modo Digitação</button>
  </div>


  <form id="chat-form" onsubmit="sendMessage(event)">
    <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off" required>
    <button type="submit">Enviar</button>
  </form>
</div>

<script src="static\script.js"></script>
</body>
</html>
